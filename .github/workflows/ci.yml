name: QA Suite — Newman + Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Newman)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and htmlextra reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          newman run postman/restful-booker.collection.json \
            --environment postman/restful-booker.environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/api-report.html

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/api-report.html

  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: playwright
        run: npm install

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
